<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%">
  <defs>
    <style>
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes scanline { 0% { opacity: 0.1; } 50% { opacity: 0.4; } 100% { opacity: 0.1; } }
      .bg { fill: transparent; }
      .text-sub { font-family: 'JetBrains Mono', monospace; font-size: 14px; fill: #8B949E; }
      .text-neon { fill: #38BDF8; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
      .cursor { fill: #0070F3; animation: blink 1s step-end infinite; }
      .glow-line { stroke: url(#gradLine); stroke-width: 1; opacity: 0.5; animation: scanline 4s infinite; }
    </style>
    <linearGradient id="gradLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D1117" stop-opacity="0" />
      <stop offset="50%" stop-color="#7928CA" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Top decorative line -->
  <path d="M 100 20 L 700 20" class="glow-line" />
  <path d="M 380 20 L 400 30 L 420 20" fill="none" stroke="#7928CA" stroke-width="1" opacity="0.5" />

  <!-- Footer Text -->
  <g text-anchor="middle" transform="translate(400, 65)">
    <text class="text-sub">CONNECTION_TERMINATED</text>
    <text y="25" class="text-neon" opacity="0.7">STATUS: AWAITING QUERY <tspan class="cursor">_</tspan></text>
  </g>
  
  <!-- Bottom decorative line -->
  <path d="M 100 110 L 700 110" class="glow-line" />
</svg>
