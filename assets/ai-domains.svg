<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%">
  <defs>
    <style>
      @keyframes shift { 0% { opacity: 0.8; } 50% { opacity: 1; filter: brightness(1.2); } 100% { opacity: 0.8; } }
      .bg { fill: transparent; }
      .domain-card { fill: rgba(13, 17, 23, 0.8); stroke: rgba(255,255,255,0.08); rx: 16px; }
      .title { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; fill: #E6EDF3; }
      .icon-bg-blue { fill: rgba(0, 112, 243, 0.1); rx: 12px; }
      .icon-bg-purple { fill: rgba(121, 40, 202, 0.1); rx: 12px; }
      .anim { animation: shift 4s infinite alternate; }
    </style>
  </defs>
  
  <rect width="100%" height="100%" class="bg" />

  <!-- Layout: 4 horizontal blocks -->
  <!-- Block 1: NLP -->
  <g transform="translate(20, 40)" class="anim" style="animation-delay: 0s;">
    <rect width="175" height="120" class="domain-card" />
    <rect x="67.5" y="20" width="40" height="40" class="icon-bg-purple" />
    <path d="M 77.5 40 Q 87.5 30 97.5 40 T 117.5 40" stroke="#A855F7" stroke-width="2" fill="none" />
    <text x="87.5" y="90" text-anchor="middle" class="title">NLP Systems</text>
  </g>

  <!-- Block 2: Computer Vision -->
  <g transform="translate(215, 40)" class="anim" style="animation-delay: 1s;">
    <rect width="175" height="120" class="domain-card" />
    <rect x="67.5" y="20" width="40" height="40" class="icon-bg-blue" />
    <circle cx="87.5" cy="40" r="8" stroke="#38BDF8" stroke-width="2" fill="none" />
    <circle cx="87.5" cy="40" r="2" fill="#38BDF8" />
    <text x="87.5" y="90" text-anchor="middle" class="title">Computer Vision</text>
  </g>

  <!-- Block 3: Predictive Mod -->
  <g transform="translate(410, 40)" class="anim" style="animation-delay: 2s;">
    <rect width="175" height="120" class="domain-card" />
    <rect x="67.5" y="20" width="40" height="40" class="icon-bg-purple" />
    <path d="M 75 45 L 85 35 L 95 40 L 105 25" stroke="#A855F7" stroke-width="2" fill="none" />
    <text x="87.5" y="90" text-anchor="middle" class="title">Predictive AI</text>
  </g>

  <!-- Block 4: MLOps -->
  <g transform="translate(605, 40)" class="anim" style="animation-delay: 3s;">
    <rect width="175" height="120" class="domain-card" />
    <rect x="67.5" y="20" width="40" height="40" class="icon-bg-blue" />
    <polygon points="87.5,25 105,35 105,55 87.5,65 70,55 70,35" stroke="#38BDF8" stroke-width="2" fill="none" />
    <text x="87.5" y="90" text-anchor="middle" class="title">AI Architecture</text>
  </g>
</svg>
