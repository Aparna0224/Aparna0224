<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%">
  <defs>
    <style>
      @keyframes float { 0% { transform: translateY(0px) } 50% { transform: translateY(-6px) } 100% { transform: translateY(0px) } }
      @keyframes pulseGlow { 0% { opacity: 0.6 } 50% { opacity: 1 } 100% { opacity: 0.6 } }
      @keyframes dash { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }
      .bg { fill: #0D1117; }
      .border { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 1; }
      .text-title { font-family: 'Inter', system-ui, sans-serif; font-size: 48px; font-weight: 700; fill: #E6EDF3; letter-spacing: 2px; }
      .text-sub { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 16px; font-weight: 400; fill: #8B949E; }
      .glow-blue { fill: url(#blueGlow); }
      .glow-purple { fill: url(#purpleGlow); }
      .circuit { fill: none; stroke: url(#circuitGrad); stroke-width: 1.5; stroke-dasharray: 10 15; animation: dash 35s linear infinite; }
      .particle { fill: #38BDF8; animation: pulseGlow 3s infinite; }
    </style>
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0070F3" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#38BDF8" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#7928CA" stop-opacity="0.1" />
    </linearGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0070F3" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#0070F3" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7928CA" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#7928CA" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6EDF3" />
      <stop offset="100%" stop-color="#8B949E" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" class="bg" rx="16" />
  <rect x="0.5" y="0.5" width="799" height="249" class="border" rx="16" />
  
  <!-- Ambient Space Glows -->
  <circle cx="150" cy="125" r="250" class="glow-blue" />
  <circle cx="700" cy="125" r="250" class="glow-purple" />
  
  <!-- Glassmorphism Hex Grid background layer (abstract) -->
  <g opacity="0.1">
    <path d="M 0 0 L 800 0 L 800 250 L 0 250 Z" fill="url(#blueGlow)" />
  </g>

  <!-- Circuit Lines -->
  <path d="M -50 40 L 120 40 L 160 80 L 640 80 L 680 120 L 850 120" class="circuit" />
  <path d="M -50 210 L 180 210 L 220 170 L 580 170 L 620 130 L 850 130" class="circuit" style="animation-direction: reverse; animation-duration: 40s;" />
  <path d="M 300 -50 L 300 20 L 330 50 L 470 50 L 500 80 L 500 300" class="circuit" stroke-opacity="0.3" />

  <!-- Nodes / Particles -->
  <circle cx="120" cy="40" r="3" class="particle" style="animation-delay: 0s;" />
  <circle cx="640" cy="80" r="3" class="particle" style="animation-delay: 1.2s; fill: #A855F7;" />
  <circle cx="180" cy="210" r="3" class="particle" style="animation-delay: 0.5s;" />
  <circle cx="620" cy="130" r="3" class="particle" style="animation-delay: 2s; fill: #A855F7;" />

  <!-- Core Content Floating -->
  <g style="animation: float 6s ease-in-out infinite;">
    <text x="400" y="125" text-anchor="middle" class="text-title">APARNA</text>
    <text x="400" y="165" text-anchor="middle" class="text-sub">&gt; Artificial Intelligence &amp; Data Science Engineer</text>
  </g>
</svg>
