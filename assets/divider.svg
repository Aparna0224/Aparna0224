<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 40" width="100%">
  <defs>
    <style>
      @keyframes pulse { 0% { opacity: 0.3 } 50% { opacity: 1 } 100% { opacity: 0.3 } }
      .line { stroke: url(#lineGrad); stroke-width: 1px; }
      .node { fill: #38BDF8; animation: pulse 3s infinite; }
      .node-core { fill: #0D1117; stroke: rgba(255,255,255,0.2); stroke-width: 1; }
    </style>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0070F3" stop-opacity="0" />
      <stop offset="35%" stop-color="#0070F3" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#38BDF8" stop-opacity="1" />
      <stop offset="65%" stop-color="#7928CA" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#7928CA" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Left Line -->
  <line x1="50" y1="20" x2="380" y2="20" class="line" />
  
  <!-- Right Line -->
  <line x1="420" y1="20" x2="750" y2="20" class="line" />
  
  <!-- Center Node -->
  <g transform="translate(400, 20)">
    <circle cx="0" cy="0" r="15" fill="url(#nodeGlow)" class="node" />
    <polygon points="0,-4 4,0 0,4 -4,0" fill="#E6EDF3" style="animation: pulse 4s infinite reverse;" />
  </g>
</svg>
